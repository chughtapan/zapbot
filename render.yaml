services:
  - type: web
    name: zapbot-gateway
    rootDir: gateway
    runtime: node
    plan: free
    buildCommand: curl -fsSL https://bun.sh/install | bash && ~/.bun/bin/bun install --production
    startCommand: ~/.bun/bin/bun run src/index.ts
    healthCheckPath: /healthz
    envVars:
      - key: GATEWAY_SECRET
        generateValue: true
      - key: PORT
        value: "8080"
