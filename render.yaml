services:
  - type: web
    name: zapbot-gateway
    rootDir: gateway
    runtime: node
    plan: free
    buildCommand: bun install --production
    startCommand: bun run src/index.ts
    healthCheckPath: /healthz
    envVars:
      - key: GATEWAY_SECRET
        generateValue: true
      - key: PORT
        value: "8080"
